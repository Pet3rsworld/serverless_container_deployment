name: Deploy Fintech API to AWS ECS

# ─── TRIGGER ─────────────────────────────────────
# This workflow runs every time code is pushed to main
on:
  push:
    branches:
      - main

# ─── PERMISSIONS ─────────────────────────────────
# Grant read access to checkout the code
permissions:
  contents: read

# ─── JOBS ────────────────────────────────────────
jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download our code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials using our secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Install Terraform on the runner
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"

      # Step 4: Initialize Terraform and specifically build the ECR registry
      - name: Terraform Init & Build Target
        run: |
          terraform init
          terraform apply -target=module.ecr -auto-approve

      # Step 5: Authenticate Docker to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 6: Build the Docker image
      - name: Build Docker Image
        run: docker build -t serverless_container_deployment-fintech-repo:latest app/

      # Step 7: Tag & Push the Docker image to ECR
      - name: Tag and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: serverless_container_deployment-fintech-repo
          IMAGE_TAG: latest
        run: |
          docker tag serverless_container_deployment-fintech-repo:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # Step 8: Apply the remaining Terraform changes
      - name: Terraform Apply Infrastructure
        run: terraform apply -auto-approve

      # Step 9: Force ECS to pull the latest image
      - name: Force New ECS Deployment
        run: |
          aws ecs update-service \
            --cluster serverless_container_deployment-grouping-cluster \
            --service container-ecs-api \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
